name: Regression Tests

on:
  push:
    branches:
      - master
      - development
  pull_request:
    branches:
      - master
      - development

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: freqtrade
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose jq bc unzip
          
      - name: Create required log directory
        run: mkdir -p user_data/logs

      - name: Download Historical Data
        run: |
          podman-compose run --rm freqtrade download-data \
            --config user_data/config_backtest.json \
            --timerange 20251120- \
            -t 5m 1h
            
      - name: Run Regression Tests
        run: |
          chmod +x run_regression_tests.sh
          ./run_regression_tests.sh
